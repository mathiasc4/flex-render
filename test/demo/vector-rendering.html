<!DOCTYPE html>
<html>
<head>
    <title>Vector Tile Renderer Comparison Demo</title>

    <script type="text/javascript" src='../../openseadragon/openseadragon.js'></script>
    <script type="text/javascript" src='/build/openseadragon/flex-renderer.js'></script>
    <script type="text/javascript" src='../lib/jquery-1.9.1.min.js'></script>
    <script type="text/javascript" src='../lib/jquery-ui-1.10.2/js/jquery-ui-1.10.2.min.js'></script>
    <link rel="stylesheet" href="../lib/jquery-ui-1.10.2/css/smoothness/jquery-ui-1.10.2.min.css">

    <script type="module" src="vector-rendering.js"></script>

    <style>
        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
        }

        .content {
            max-width: 1280px;
            min-height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .demo-main {
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .viewer-section {
            min-width: 0;
        }

        .viewer-container {
            aspect-ratio: 4 / 3;
            border: thin gray solid;
            position: relative;
        }

        .viewer-title {
            margin: 0 0 8px 0;
        }

        .image-sources-panel {
            margin: 12px 0 0 0;
            padding: 10px;
            border: thin gray solid;
            background: #f8f8f8;
            font-size: 13px;
            box-sizing: border-box;
            min-width: 0;
            min-height: 0;
            overflow: auto;
        }

        .image-sources-panel h3 {
            margin: 0 0 8px 0;
        }

        .image-options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .image-options {
            display: grid;
            grid-template-columns: 24px 160px minmax(0, 1fr);
            align-items: start;
            gap: 8px;
            margin: 0;
            padding: 6px;
            border: 1px solid #d1d5db;
            background: #ffffff;
            box-sizing: border-box;
        }

        .image-options-drag-handle {
            cursor: move;
            color: #555;
            text-align: center;
            margin-top: 2px;
        }

        .image-options-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #111;
            min-width: 0;
            word-break: break-word;
        }

        .image-options-title input {
            flex: 0 0 auto;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 8px;
            min-width: 0;
        }

        .option-grid label {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 11px;
            color: #666;
            min-width: 0;
        }

        .option-grid input,
        .option-grid select {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            font-size: 13px;
            color: #111;
        }

        .option-grid input[type="checkbox"] {
            width: auto;
            align-self: flex-start;
        }

        .image-sources-help {
            margin: 8px 0 0 0;
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 1000px) {
            .option-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 700px) {
            .image-options {
                grid-template-columns: 24px minmax(0, 1fr);
            }

            .option-grid {
                grid-column: 1 / -1;
            }

            .option-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="content">
    <h2>Vector Rendering Demo</h2>

    <h3 id="title-w" class="viewer-title">OpenSeadragon viewer using FlexDrawer vector sources</h3>

    <main class="demo-main">
        <section class="viewer-section">
            <div id="viewer-container" class="viewer-container"></div>
        </section>

        <section class="image-sources-panel">
            <h3>Image sources</h3>
            <div id="image-options-container" class="image-options-list"></div>
            <p class="image-sources-help">
                Configure the OpenSeadragon TiledImages.
            </p>
        </section>
    </main>
</div>
</body>
</html>
